<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7f4ef">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mon foyer">
<title>Courses, Repas et Stock</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <div class="page-title">Accueil dynamique</div>
  <p class="page-subtitle">Repas, courses et stock restent accessibles au même endroit.</p>
  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <div class="statusbar"><span>9:41</span><span>● ● ●</span></div>
      <main class="app">
        <div class="app-head"><div class="title">Accueil</div><button class="settings-btn" id="openSettings" aria-label="Ouvrir les paramètres">⚙</button></div>
        <div class="hub-grid">
          <button class="hub repas active" data-hub="repas"><div class="avatar">🍽️</div><div class="name">Repas</div><div class="desc">Midi : Yassa<br>Soir : Gratin</div></button>
          <button class="hub courses" data-hub="courses"><div class="avatar">🛒</div><div class="name">Courses</div><div class="desc"><span id="courseCount">0</span> à acheter</div></button>
          <button class="hub stock" data-hub="stock"><span class="alert-count hub-alert-count" id="hubStockAlert" hidden>0</span><div class="avatar">📦</div><div class="name">Stock</div><div class="desc"><span id="stockLowCount">0</span> produits à surveiller</div></button>
        </div>
        <button class="stock-alert-line" id="stockAlertLine" type="button" hidden></button>
        <section class="dynamic" id="dynamic"></section>
        <div class="no-scroll-note">Conception mobile sans défilement horizontal.</div>
      </main>
      <nav class="bottom" aria-label="Navigation principale"><button class="nav active" data-nav="accueil" type="button">⌂<span>Accueil</span></button><button class="nav" data-nav="courses" type="button">🛒<span>Courses</span></button><button class="nav" data-nav="repas" type="button">🍽️<span>Repas</span></button><button class="nav nav-stock" data-nav="stock" type="button"><span class="alert-count nav-alert-count" id="navStockAlert" hidden>0</span>📦<span>Stock</span></button></nav>
    </div>
  </div>
</div>
<dialog id="editor"><form method="dialog" class="modal" id="editorForm"></form></dialog>
<dialog id="settingsDialog"><div class="settings-modal"><div class="settings-head"><h2>Paramètres</h2><button class="settings-close" id="closeSettings" aria-label="Fermer">×</button></div><div id="settingsContent"></div></div></dialog>
<input id="importDataFile" type="file" accept="application/json,.json" hidden>
<script src="app.js"></script>
</body>
</html>
